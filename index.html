
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
  <title>Super Salgados</title>
  <style>
    :root { --headerH: 0px; --destaquesH: 0px; --categoriasH: 0px; }

    body{margin:0;font-family:Arial,sans-serif;background:#fff8e1;color:#333;padding-bottom:60px;}
    header{
      padding:1px;background:#fad400;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;
      position:relative;
    }
   .logo-img { width: 600px; max-width: 100%; height: auto; object-fit: contain; display: block; margin: 0 auto; }

    html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; }
    header,.top-section,.destaques,.categories,.product-list { max-width: 100%; box-sizing: border-box; }

   .destaques{
      display:flex; gap:10px; padding:10px; background:#fff8e1;
      position:sticky; top:0; z-index:40;
    }
   .destaque-item{flex:1;background:#fff;border-radius:10px;padding:8px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
   .destaque-item img{width:100%;height:90px;object-fit:cover;border-radius:8px;}
   .destaque-item h3{font-size:14px;margin:5px 0;}
   .price{font-size:14px;color:#e53935;font-weight:bold;}

   .categories{
      display:flex; gap:10px; padding:10px; background:#fff8e1; border-bottom:1px solid #eee;
      position:sticky; top:var(--destaquesH); z-index:39;
    }
   .categories button{flex:1;}

   .product-list{padding:10px; padding-bottom: 50px; position:relative; z-index:10;}
   .card-item{display:flex;align-items:center;background:#fff;border-radius:10px;padding:15px;margin-bottom:15px;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
   .card-item img{width:80px;height:80px;object-fit:cover;border-radius:8px;margin-right:15px;}

    #bottomBar {
      position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #ddd;
      display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; font-weight: bold; z-index: 60;
    }
    #bottomTotal.valor{ color:#e53935; }

   .btn{padding:6px 10px;border:none;border-radius:6px;font-weight:bold;cursor:pointer;font-size:19px;transition:transform 0.1s ease;}
   .btn:active{transform:scale(0.95);}
   .btn.primary{background:#4caf50;color:#fff;}
   .btn.secondary{background:#dda408;color:#000000;}
   .btn.danger{background:#ff5c5c;color:#fff;}

    #toast{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:8px 14px;border-radius:6px;opacity:0;transition:.2s;z-index:9999;pointer-events:none;}
    #toast.show{opacity:.95;}

    #header { display: none; }
    body.is-home #header { display: flex; }

    #mascote{
      position:fixed;
      right:16px; bottom:80px;
      font-size:44px; line-height:1;
      transform: translateY(20px) scale(.9);
      opacity:0; pointer-events:none;
      z-index:9998;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,.2));
      transition: opacity.18s ease, transform.18s ease;
    }
    #mascote.show{
      opacity:1; transform: translateY(0) scale(1);
      animation: pop.28s ease;
    }
    #mascote.hands{ display:inline-block; transform-origin: 50% 60%; }
    #mascote.clap.hands{ animation: clap.45s ease; }
    @keyframes pop {
      0%{ transform: translateY(20px) scale(.9) }
      60%{ transform: translateY(-4px) scale(1.06) }
      100%{ transform: translateY(0) scale(1) }
    }
    @keyframes clap {
      0% { transform: scale(1) rotate(0deg) }
      15%{ transform: scale(1.12) rotate(-6deg) }
      30%{ transform: scale(0.96) rotate(6deg) }
      45%{ transform: scale(1.12) rotate(-6deg) }
      60%{ transform: scale(0.96) rotate(6deg) }
      75%{ transform: scale(1.12) rotate(-6deg) }
      100%{ transform: scale(1) rotate(0deg) }
    }
    @media (max-width:360px){
      #mascote{ right:12px; bottom:76px; font-size:40px; }
    }
  </style>
</head>
<body class="is-home">

  <!-- Link discreto para o admin -->
  <div style="text-align:center; padding:8px 0 12px; font-size:12px; opacity:.6">
    <a href="admin.html" style="color:inherit; text-decoration:none;">Área do administrador</a>
  </div>

  <header id="header">
    <img src="img/logo.png" alt="Super Salgados" class="logo-img">
  </header>

  <div id="toast">item adicionado</div>
  <div id="mascote" aria-hidden="true"><span class="hands">👏</span></div>

  <div class="destaques" id="destaques">
    <div class="destaque-item">
      <img src="img/coxinha.jpg" alt="Combo 25 Coxinhas">
      <h3>Combo 25 Coxinhas</h3>
      <div class="price">R$ 27,30</div>
      <button class="btn primary" onclick="addToCart('c23')">Adicionar</button>
    </div>
    <div class="destaque-item">
      <img src="img/coxinha.jpg" alt="Combo 25 Kibes">
      <h3>Combo 25 Kibes</h3>
      <div class="price">R$ 27,30</div>
      <button class="btn primary" onclick="addToCart('c24')">Adicionar</button>
    </div>
    <div class="destaque-item">
      <img src="img/coxinha.jpg" alt="Combo 25 Risoles">
      <h3>Combo 25 Risoles</h3>
      <div class="price">R$ 27,30</div>
      <button class="btn primary" onclick="addToCart('c25')">Adicionar</button>
    </div>
  </div>

  <div class="categories" id="categories">
    <button class="btn secondary" onclick="filtrarCategoria('combos')">Combos</button>
    <button class="btn secondary" onclick="filtrarCategoria('bebidas')">Refrigerantes</button>
    <button class="btn secondary" onclick="filtrarCategoria('promoções')">promoções</button>
  </div>

  <div class="page-wrap">
    <div id="pageProdutos" class="product-list"></div>
  </div>

  <div id="bottomBar">
    <span id="bottomTotal">Subtotal: <span class="valor">R$ 0,00</span></span>
    <button class="btn primary" onclick="location.href='carrinho.html'">Ver sacola</button>
  </div>

<script>
  const TAXA = 4.00;
  let categoriaAtual = 'combos';
  const CART_KEY = 'ss_cart_v1';

  const PRODUCTS = {
    combos: [
      { id:'c23', title:'Combo 25 Coxinhas', price:27.30, desc:'25 coxinhas + refri lata', img:'img/coxinha.jpg' },

      { id:'c8', title:'Combo 40 (20+20)', price:46.69, desc:'20 risoles + 20 bolinhas + Convenção 2L', img:'img/coxinha.jpg' },
      { id:'c9', title:'Combo 40 (20+20)', price:46.69, desc:'20 risoles + 20 kibes + Convenção 2L', img:'img/coxinha.jpg' },

      { id:'c13', title:'Combo 60 (25+15+15)', price:66.29, desc:'25 coxinhas + 15 bolinhas + 15 kibes + Convenção 2L', img:'img/coxinha.jpg' },
      { id:'c14', title:'Combo 60 (25+15+15)', price:66.29, desc:'25 risoles + 15 coxinhas + 15 bolinhas + Convenção 2L', img:'img/coxinha.jpg' },
      { id:'c15', title:'Combo 60 (25+15+15)', price:66.29, desc:'25 risoles + 15 coxinhas + 15 kibes + Convenção 2L', img:'img/coxinha.jpg' },
      { id:'c16', title:'Combo 60 (25+15+15)', price:66.29, desc:'25 risoles + 15 bolinhas + 15 kibes + Convenção 2L', img:'img/coxinha.jpg' },
      { id:'c17', title:'Combo 60 (25+15+15)', price:66.29, desc:'25 bolinhas + 15 coxinhas + 15 risoles + Convenção 2L', img:'img/coxinha.jpg' },
      { id:'c18', title:'Combo 60 (25+15+15)', price:66.29, desc:'25 bolinhas + 15 coxinhas + 15 kibes + Convenção 2L', img:'img/coxinha.jpg' },
      { id:'c19', title:'Combo 60 (25+15+15)', price:66.29, desc:'25 bolinhas + 15 risoles + 15 kibes + Convenção 2L', img:'img/coxinha.jpg' },
      { id:'c20', title:'Combo 60 (25+15+15)', price:66.29, desc:'25 kibes + 15 coxinhas + 15 risoles + Convenção 2L', img:'img/coxinha.jpg' },
      { id:'c21', title:'Combo 60 (25+15+15)', price:66.29, desc:'25 kibes + 15 coxinhas + 15 bolinhas + Convenção 2L', img:'img/coxinha.jpg' },
      { id:'c22', title:'Combo 60 (25+15+15)', price:66.29, desc:'25 kibes + 15 risoles + 15 bolinhas + Convenção 2L', img:'img/coxinha.jpg' },
      { id:'c1', title:'Combo 100 (25+25+50)', price:105.49, desc:'25 coxinhas + 25 risoles + 50 bolinhas + Convenção 2L', img:'img/coxinha.jpg' },
      { id:'c2', title:'Combo 100 (25+25+50)', price:105.49, desc:'25 coxinhas + 25 risoles + 50 kibes + Convenção 2L', img:'img/coxinha.jpg' },
      { id:'c3', title:'Combo 100 (25+25+50)', price:105.49, desc:'25 coxinhas + 25 bolinhas + 50 risoles + Convenção 2L', img:'img/coxinha.jpg' },
      { id:'c4', title:'Combo 100 (25+25+50)', price:105.49, desc:'25 risoles + 25 bolinhas + 50 kibes + Convenção 2L', img:'img/coxinha.jpg' },
    ],
    bebidas: [
      { id:'b1', title:'Pepsi Lata 350ml', price:7.00, desc:'Pepsi gelada 350ml', img:'img/pepsi-lata.jpg' },
      { id:'b2', title:'Coca-Cola Lata 350ml', price:7.00, desc:'Coca-Cola gelada 350ml', img:'img/coca-lata.jpg' },
      { id:'b3', title:'Fanta Laranja Lata 350ml', price:7.00, desc:'Fanta sabor laranja 350ml', img:'img/fanta-laranja-lata.jpg' },
      { id:'b4', title:'Fanta Uva Lata 350ml', price:7.00, desc:'Fanta sabor uva 350ml', img:'img/fanta-uva-lata.jpg' },
      { id:'b5', title:'Guaraná Antarctica Lata 350ml', price:7.00, desc:'Guaraná Antarctica 350ml', img:'img/guarana-lata.jpg' },
      { id:'b6', title:'Sukita Laranja Lata 350ml', price:7.00, desc:'Sukita sabor laranja 350ml', img:'img/sukita-laranja-lata.jpg' },
      { id:'b7', title:'Sukita Uva Lata 350ml', price:7.00, desc:'Sukita sabor uva 350ml', img:'img/sukita-uva-lata.jpg' },
      { id:'b8', title:'Itubaína Lata 350ml', price:7.00, desc:'Itubaína tradicional 350ml', img:'img/itubaina-lata.jpg' },
      { id:'b9', title:'Convenção Frutaina 2L', price:9.99, desc:'Convenção sabor frutaina 2 litros', img:'img/convensao-frutaina-2l.jpg' },
      { id:'b10', title:'Convenção Guaraná 2L', price:9.99, desc:'Convenção sabor guaraná 2 litros', img:'img/convensao-guarana-2l.jpg' },
      { id:'b11', title:'Coca-Cola 2L', price:16.99, desc:'Coca-Cola garrafa 2 litros', img:'img/coca-2l.jpg' },
    ],
    promoções: [
      { id:'a1', title:'25 Coxinhas Avulsas', price:24.50, desc:'25 coxinhas', img:'img/coxinhas.jpg' },
      { id:'a2', title:'25 Risoles Avulsos', price:24.50, desc:'25 risoles', img:'img/risoles.jpg' },
      { id:'a3', title:'25 Bolinhas de Queijo Avulsas', price:24.50, desc:'25 bolinhas de queijo', img:'img/bolinhas_de_queijo.jpg' },
      { id:'a4', title:'25 Kibes Avulsos', price:24.50, desc:'25 kibes', img:'img/kibes.jpg' },
      { id:'a5', title:'25 Churros Avulsos', price:24.50, desc:'25 churros', img:'img/churros.jpg' },
      { id:'c1', title:'Combo 25 Coxinhas', price:27.30, desc:'25 coxinhas + refri lata', img:'img/coxinha.jpg' },
      { id:'c2', title:'Combo 25 Kibes', price:27.30, desc:'25 kibes + refri lata', img:'img/kibe.jpg' },
      { id:'c3', title:'Combo 25 Risoles', price:27.30, desc:'25 risoles + refri lata', img:'img/risoles.jpg' },
    ],
  };

  function filtrarCategoria(cat){categoriaAtual=cat;renderProdutos();}

  function renderProdutos(){
    const container=document.getElementById('pageProdutos');
    container.innerHTML='';
    PRODUCTS[categoriaAtual].forEach(p=>{
      const div=document.createElement('div');
      div.className='card-item';
      div.innerHTML=`
        <img src="${p.img}" alt="${p.title}">
        <div class="card-info">
          <h3>${p.title}</h3>
          <p>${p.desc}</p>
          <div class="price">R$ ${p.price.toFixed(2).replace('.',',')}</div>
          <button class="btn primary" onclick="addToCart('${p.id}')">Adicionar</button>
        </div>
      `;
      container.appendChild(div);
    });
    updateOffsets();
  }

  function getCart(){
    try { return JSON.parse(localStorage.getItem(CART_KEY) || '[]'); } catch(e){ return []; }
  }
  function setCart(cart){
    localStorage.setItem(CART_KEY, JSON.stringify(cart));
  }

  function addToCart(id){
    const all = [...PRODUCTS.combos,...PRODUCTS.bebidas,...PRODUCTS.promoções];
    const p = all.find(x=>x.id===id);
    if(!p) return;
    const cart = getCart();
    const existing = cart.find(i=>i.id===id);
    if(existing) existing.qty++;
    else cart.push({id:p.id,title:p.title,price:p.price,qty:1,desc:p.desc,img:p.img});
    setCart(cart);
    updateBottomBar();
    showToast('item adicionado');
    showMascote();
  }

  function updateBottomBar(){
    const cart = getCart();
    const subtotal = cart.reduce((s,i)=>s+i.price*i.qty,0);
    document.getElementById('bottomTotal').innerHTML=`Subtotal: <span class="valor">R$ ${subtotal.toFixed(2).replace('.',',')}</span>`;
  }

  function showToast(msg){
    const t=document.getElementById('toast');
    if(msg) t.textContent=msg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),1200);
  }

  let mascoteTimer = null;
  function showMascote(){
    const m = document.getElementById('mascote');
    if(!m) return;
    m.classList.remove('show','clap');
    void m.offsetWidth;
    m.classList.add('show','clap');
    clearTimeout(mascoteTimer);
    mascoteTimer = setTimeout(()=> m.classList.remove('show','clap'), 900);
  }

  function updateOffsets(){
    const hH = document.getElementById('header')?.offsetHeight || 0;
    const hD = document.getElementById('destaques')?.offsetHeight || 0;
    const hC = document.getElementById('categories')?.offsetHeight || 0;
    document.documentElement.style.setProperty('--headerH', hH + 'px');
    document.documentElement.style.setProperty('--destaquesH', hD + 'px');
    document.documentElement.style.setProperty('--categoriasH', hC + 'px');
  }
  window.addEventListener('resize', updateOffsets);

  document.addEventListener("DOMContentLoaded", () => {
    renderProdutos();
    updateBottomBar();
    requestAnimationFrame(updateOffsets);
    setTimeout(updateOffsets, 200);
  });
</script>
</body>
</html>
