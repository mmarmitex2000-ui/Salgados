




<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
  <title>Super Salgados</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#fff8e1;color:#333;padding-bottom:60px;}
    header{padding:1px;background:#fad400;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;}
    .logo{font-size:40px;font-weight:bold;text-align:center;background:linear-gradient(to left,#ff0000,#ff69b4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.logo-img {
  width: 500px;       /* aumenta a largura */
  height: auto;       /* mantém proporção */
  display: block;
  margin: 10px auto;  /* centraliza */
}


.logo-img {
  width: 600px;
  height: px;
  object-fit: contain; /* evita distorção */
  display: block;
  margin: 0px auto;
}


html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  overflow-x: hidden; /* evita rolagem lateral */
}

header, .top-section, .destaques, .categories, .product-list {
  max-width: 100%;
  box-sizing: border-box;
}


.logo-img {
  max-width: 100%;
  height: auto;
}
/* Barra padrão visível fora do carrinho */
#bottomBar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  border-top: 1px solid #ddd;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 20px;
}

/* Quando o carrinho estiver aberto, esconda o botão */
.carrinho-aberto #bottomBar button {
  display: none;
}

/* Mantém o total visível dentro do carrinho */
.carrinho-aberto #bottomBar #bottomTotal {
  flex: 1;
  text-align: center;
}
















    .btn{padding:6px 10px;border:none;border-radius:6px;font-weight:bold;cursor:pointer;font-size:19px;transition:transform 0.1s ease;}
    .btn:active{transform:scale(0.95);} 
    .btn.primary{background:#4caf50;color:#fff;}   
    .btn.secondary{background:#dda408;color:#000000;}
    .btn.danger{background:#ff5c5c;color:#fff;}

    .destaques{display:flex;gap:10px;padding:10px;position:sticky;top:0;background:#fff8e1;z-index:10;transition:opacity 0.3s ease, transform 0.3s ease;}
    .destaque-item{flex:1;background:#fff;border-radius:10px;padding:8px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
    .destaque-item img{width:100%;height:90px;object-fit:cover;border-radius:8px;}
    .destaque-item h3{font-size:14px;margin:5px 0;}
    .destaque-item .price{font-size:14px;color:#e53935;font-weight:bold;}

    .categories{display:flex;gap:10px;padding:10px;}
    .categories button{flex:1;}

    .product-list{padding:10px;}
    .product-list { padding-bottom: 50px; /* empurra todos os itens para cima */
}
    .card-item{display:flex;align-items:center;background:#fff;border-radius:10px;padding:15px;margin-bottom:15px;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
    .card-item img{width:80px;height:80px;object-fit:cover;border-radius:8px;margin-right:15px;}

    #pageCarrinho{display:none;padding:20px;}
    .cart-item{display:flex;align-items:center;gap:10px;padding:8px;background:#fff;border-radius:8px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.1);}
    .cart-item img{width:50px;height:50px;object-fit:cover;border-radius:6px;}

    .molhos{display:flex;gap:8px;margin:10px 0;}
    .molho-card{flex:1;background:#fff;border-radius:8px;padding:4px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.1);}
    .molho-card img{width:100%;height:45px;object-fit:cover;border-radius:6px;}
    .molho-card strong{font-size:13px;}
    .molho-card p{font-size:12px;margin:4px 0;}
    .molho-card div{font-size:12px;}
    .molho-card button{font-size:12px;padding:4px 6px;}

   

    #modalEndereco{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;}
    .modal-content{background:#fff;padding:15px;border-radius:10px;width:300px;text-align:center;}
    .modal-content input, .modal-content select{width:100%;padding:6px;margin:4px 0;border:1px solid #ccc;border-radius:5px;font-size:13px;}
    .cupom{background:#f9f9f9;border:1px dashed #aaa;padding:10px;margin:10px 0;text-align:left;font-size:13px;}
    .cupom h4{margin:0 0 8px 0;text-align:center;}
  </style>
</head>
<body>


<header>
  <img src="img/logo.png" alt="Super Salgados" class="logo-img">
</header>





<!-- Destaques -->




<div class="destaques" id="destaques">
  <div class="destaque-item">
    <img src="img/coxinha.jpg" alt="Combo 25 Coxinhas">
    <h3>Combo 25 Coxinhas</h3>
    <div class="price">R$ 27,30</div>
    <button class="btn primary" onclick="addToCart('c1')">Adicionar</button>
  </div>
  <div class="destaque-item">
    <img src="img/coxinha.jpg" alt="Combo 25 Kibes">
    <h3>Combo 25 Kibes</h3>
    <div class="price">R$ 27,30</div>
    <button class="btn primary" onclick="addToCart('c2')">Adicionar</button>
  </div>
  <div class="destaque-item">
    <img src="img/coxinha.jpg" alt="Combo 25 Risoles">
    <h3>Combo 25 Risoles</h3>
    <div class="price">R$ 27,30</div>
    <button class="btn primary" onclick="addToCart('c3')">Adicionar</button>
  </div>
</div>

<div class="categories" id="categories">
  <button class="btn secondary" onclick="filtrarCategoria('combos')">Combos</button>
  <button class="btn secondary" onclick="filtrarCategoria('bebidas')">Refrigerantes</button>
</div>

<div id="pageProdutos" class="product-list"></div>

<div id="pageCarrinho">
  

<button 
  class="btn secondary" 
  onclick="voltarProdutos()" 
  style="background:#e61506; color:#fff; font-weight:bold;">
  ← Voltar
</button>




  <h2>Adicionar molhos ?</h2>

  <h3>Molhos</h3>
  <div class="molhos">
    <div class="molho-card">
      <img src="img/coxinha.jpg">
      <strong>Molho Barbecue</strong>
      <p>Defumado</p>
      <div>R$ 5,00</div>
      <button class="btn primary" onclick="addMolho('Molho Barbecue')">Adicionar</button>
    </div>
    <div class="molho-card">
      <img src="img/coxinha.jpg">
      <strong>Molho Cheddar</strong>
      <p>Cremoso</p>
      <div>R$ 5,00</div>
      <button class="btn primary" onclick="addMolho('Molho Cheddar')">Adicionar</button>
    </div>
    <div class="molho-card">
      <img src="img/coxinha.jpg">
      <strong>Molho de Alho</strong>
      <p>Tradicional</p>
      <div>R$ 5,00</div>
      <button class="btn primary" onclick="addMolho('Molho de Alho')">Adicionar</button>
    </div>
  </div>

  <div id="cart"></div>
  <button class="btn primary" onclick="abrirModal()">Confirmar Pedio</button>

</div>
 
<button style="visibility:hidden; margin-bottom:20px;">Botão 1</button>
<button style="visibility:hidden; margin-bottom:20px;">Botão 2</button>
<button style="visibility:hidden; margin-bottom:20px;">Botão 3</button>

<div id="bottomBar">
  <span id="bottomTotal">Subtotal: R$ 0,00</span>
  <button class="btn primary" onclick="abrirCarrinho()">Ver sacola</button>
</div>

<div id="modalEndereco">
  <div class="modal-content">
    <button class="btn secondary" onclick="fecharModal()">← Voltar para sacola</button>
    <h3>Informe seus dados</h3>
    <input type="text" id="nome" placeholder="Nome completo">
    <input type="text" id="rua" placeholder="Rua">
    <input type="text" id="numero" placeholder="Número da casa">
    <input type="text" id="bairro" placeholder="Bairro">
    <select id="pagamento">
      <option value="">Forma de pagamento</option>
      <option value="Débito">Cartão Débito</option>
      <option value="Crédito">Cartão Crédito</option>





      <option value="Dinheiro">Dinheiro</option>
    </select>
    <input type="text" id="troco" placeholder="Troco para quanto?" style="display:none;">

    <div class="cupom" id="cupomResumo">
      <h4>📜 Cupom do Pedido</h4>
      <div id="cupomItens"></div>
      <div id="cupomTotal"></div>
    </div>

    <button class="btn primary" onclick="enviarPedido()">Confirmar e Enviar</button>
    <button class="btn danger" onclick="fecharModal()">Cancelar</button>
  </div>
</div>

<script>
  const TAXA = 4.00;
  let cart = [];
  let categoriaAtual = 'combos';

  const PRODUCTS = {
    combos: [
{ id:'c1', title:'Combo 25 Coxinhas', price:27.30, desc:'25 coxinhas + refri lata', img:'img/coxinha.jpg' },
{ id:'c2', title:'Combo 25 Kibes', price:27.30, desc:'25 kibes + refri lata', img:'img/kibe.jpg' },
{ id:'c3', title:'Combo 25 Risoles', price:27.30, desc:'25 risoles + refri lata', img:'img/risoles.jpg' },
{ id:'c4', title:'Combo 25 Bolinhas de Queijo', price:27.30, desc:'25 bolinhas de queijo + refri lata', img:'img/bolinha-queijo.jpg' },
{ id:'c5', title:'Combo 25 Enroladinhos de Salsicha', price:27.30, desc:'25 enroladinhos de salsicha + refri lata', img:'img/enroladinho.jpg' }

      
    ],
    bebidas: [
     
      { id:'b1', title:'Pepsi Lata 350ml', price:7.00, desc:'Pepsi gelada 350ml', img:'img/pepsi-lata.jpg' },
{ id:'b2', title:'Coca-Cola Lata 350ml', price:7.00, desc:'Coca-Cola gelada 350ml', img:'img/coca-lata.jpg' },
{ id:'b3', title:'Fanta Laranja Lata 350ml', price:7.00, desc:'Fanta sabor laranja 350ml', img:'img/fanta-laranja-lata.jpg' },
{ id:'b4', title:'Fanta Uva Lata 350ml', price:7.00, desc:'Fanta sabor uva 350ml', img:'img/fanta-uva-lata.jpg' },
{ id:'b5', title:'Guaraná Antarctica Lata 350ml', price:7.00, desc:'Guaraná Antarctica 350ml', img:'img/guarana-lata.jpg' },
{ id:'b6', title:'Sukita Laranja Lata 350ml', price:7.00, desc:'Sukita sabor laranja 350ml', img:'img/sukita-laranja-lata.jpg' },
{ id:'b7', title:'Sukita Uva Lata 350ml', price:7.00, desc:'Sukita sabor uva 350ml', img:'img/sukita-uva-lata.jpg' },
{ id:'b8', title:'Itubaína Lata 350ml', price:7.00, desc:'Itubaína tradicional 350ml', img:'img/itubaina-lata.jpg' },


{ id:'b9', title:'Convenção Frutaina 2L', price:9.99, desc:'Convenção sabor frutaina 2 litros', img:'img/convensao-frutaina-2l.jpg' },
{ id:'b10', title:'Convenção Guaraná 2L', price:9.99, desc:'Convenção sabor guaraná 2 litros', img:'img/convensao-guarana-2l.jpg' },
{ id:'b11', title:'Coca-Cola 2L', price:16.99, desc:'Coca-Cola garrafa 2 litros', img:'img/coca-2l.jpg' },

    ]
  };

  
  function filtrarCategoria(cat){categoriaAtual=cat;renderProdutos();}

  function renderProdutos(){
    const container=document.getElementById('pageProdutos');
    container.innerHTML='';
    PRODUCTS[categoriaAtual].forEach(p=>{
      const div=document.createElement('div');
      div.className='card-item';
      div.innerHTML=`
        <img src="${p.img}">
        <div class="card-info">
          <h3>${p.title}</h3>
          <p>${p.desc}</p>
          <div class="price">R$ ${p.price.toFixed(2).replace('.',',')}</div>
          <button class="btn primary" onclick="addToCart('${p.id}')">Adicionar</button>
        </div>
      `;
      container.appendChild(div);
    });
  }



function abrirCarrinho() {
  // adiciona classe para esconder o botão "Ver sacola"
  document.body.classList.add('carrinho-aberto');

  // mostra carrinho
  document.getElementById('pageCarrinho').style.display = 'block';

  // esconde produtos, categorias e destaques
  document.getElementById('pageProdutos').style.display = 'none';
  document.getElementById('categories').style.display = 'none'; 
  document.getElementById('destaques').style.display = 'none';

  // renderiza itens do carrinho
  renderCart();
}

function fecharCarrinho() {
  // remove classe para voltar a mostrar o botão "Ver sacola"
  document.body.classList.remove('carrinho-aberto');

  // esconde carrinho
  document.getElementById('pageCarrinho').style.display = 'none';
}

function voltarProdutos() {
  // mostra produtos, categorias e destaques
  document.getElementById('pageProdutos').style.display = 'block';
  document.getElementById('categories').style.display = 'flex'; 
  document.getElementById('destaques').style.display = 'flex';

  // esconde carrinho
  document.getElementById('pageCarrinho').style.display = 'none';

  // garante que o botão "Ver sacola" volte
  document.body.classList.remove('carrinho-aberto');
}


  function addToCart(id){
    const p=[...PRODUCTS.combos,...PRODUCTS.bebidas].find(x=>x.id===id);
    const existing=cart.find(i=>i.id===id);
    if(existing) existing.qty++;
    else cart.push({id:p.id,title:p.title,price:p.price,qty:1,desc:p.desc,img:p.img});
    updateBottomBar();
    renderCart();
  }

  function addMolho(nome){
    cart.push({id:nome,title:nome,price:5.00,qty:1,desc:'Molho adicional',img:'img/fotos/coxinha.jpg'});
    updateBottomBar();
    renderCart();
  }

  function renderCart(){
    const cartEl=document.getElementById('cart');
    cartEl.innerHTML='';
    cart.forEach((item,idx)=>{
      cartEl.innerHTML += `
        <div class="cart-item">
          <img src="${item.img}">
          <div style="flex:1;">
            <strong>${item.title}</strong><br>
            <small>${item.desc}</small><br>
            <span>Qtd: ${item.qty} | R$ ${(item.price*item.qty).toFixed(2).replace('.',',')}</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;">
            <button class="btn secondary" onclick="increaseQty(${idx})">+</button>
            <button class="btn secondary" onclick="decreaseQty(${idx})">-</button>
          </div>
        </div>
      `;
    });
  }

  function increaseQty(idx){ cart[idx].qty++; renderCart(); updateBottomBar(); }
  function decreaseQty(idx){ if(cart[idx].qty>1){cart[idx].qty--;} else {cart.splice(idx,1);} renderCart(); updateBottomBar(); }

  function updateBottomBar(){
    const subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
    document.getElementById('bottomTotal').textContent=`Subtotal: R$ ${subtotal.toFixed(2).replace('.',',')}`;
  }

  function abrirModal(){
    if(cart.length===0){alert('Carrinho vazio');return;}
    document.getElementById('modalEndereco').style.display='flex';
    renderCupom();
  }
  function fecharModal(){document.getElementById('modalEndereco').style.display='none';}

  function renderCupom(){
    const cupomItens=document.getElementById('cupomItens');
    const cupomTotal=document.getElementById('cupomTotal');
    cupomItens.innerHTML='';
    cart.forEach(item=>{
      cupomItens.innerHTML += `${item.title} x${item.qty} - R$ ${(item.price*item.qty).toFixed(2).replace('.',',')}<br>`;
    });
    const subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
    const total=subtotal+TAXA;
    cupomTotal.innerHTML=`Subtotal: R$ ${subtotal.toFixed(2).replace('.',',')}<br>Taxa de entrega: R$ ${TAXA.toFixed(2).replace('.',',')}<br><strong>Total: R$ ${total.toFixed(2).replace('.',',')}</strong>`;
  }

  document.getElementById('pagamento').addEventListener('change',function(){
    if(this.value==='Dinheiro'){
      document.getElementById('troco').style.display='block';
    } else {
      document.getElementById('troco').style.display='none';
    }
  });


  function enviarPedido(){
    const nome=document.getElementById('nome').value;
    const rua=document.getElementById('rua').value;
    const numero=document.getElementById('numero').value;
    const bairro=document.getElementById('bairro').value;
    const pagamento=document.getElementById('pagamento').value;
    const troco=document.getElementById('troco').value;

    if(!nome||!rua||!numero||!bairro||!pagamento){
      alert('Preencha todos os campos obrigatórios');
      return;
    }

    const subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
    const total=subtotal+TAXA;
    const itens=cart.map(i=>`${i.title} x${i.qty} - R$ ${(i.price*i.qty).toFixed(2).replace('.',',')}`).join('%0A');
    let pagamentoInfo=`Forma de pagamento: ${pagamento}`;
    if(pagamento==='Dinheiro' && troco){
      pagamentoInfo+=`%0ATroco para: R$ ${troco}`;
    }

    const endereco=`Nome: ${nome}%0ARua: ${rua}, Nº: ${numero}%0ABairro: ${bairro}`;
    const mensagem=`Olá! Gostaria de fazer o seguinte pedido:%0A${itens}%0A%0ASubtotal: R$ ${subtotal.toFixed(2).replace('.',',')}%0ATaxa de entrega: R$ ${TAXA.toFixed(2).replace('.',',')}%0ATotal: R$ ${total.toFixed(2).replace('.',',')}%0A%0A${endereco}%0A${pagamentoInfo}`;
    const url=`https://wa.me/5511932198727?text=${mensagem}`;

    window.open(url,'_blank');
    cart=[]; 
    updateBottomBar(); 
    renderCart(); 
    voltarProdutos(); 
    fecharModal();
  }

  document.addEventListener("DOMContentLoaded", () => {
    renderProdutos(); // combos aparecem logo ao carregar
  });
</script>
</body>
</html>
